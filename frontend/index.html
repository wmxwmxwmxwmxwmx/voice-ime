<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice-IME</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>Voice-IME</h1>
      <p class="subtitle">实时流式语音输入</p>
    </header>

    <section class="status-bar">
      <span id="wsStatus" class="badge badge-offline">未连接</span>
      <span id="recStatus" class="badge badge-idle">空闲</span>
    </section>

    <section class="controls">
      <button id="startBtn" type="button">开始</button>
      <button id="stopBtn" type="button" disabled>停止</button>
    </section>

    <section class="config">
      <label>
        服务器
        <input id="serverUrl" type="text" value="ws://localhost:9000" />
      </label>
      <label>
        语言
        <select id="language">
          <option value="auto">自动</option>
          <option value="zh" selected>中文</option>
          <option value="en">英语</option>
        </select>
      </label>
    </section>

    <section class="transcript">
      <h2>识别结果</h2>
      <div id="result" class="result-box" aria-live="polite"></div>
    </section>

    <p class="hint">
      请先用 <code>python -m http.server 8080 -d frontend</code> 启动页面，再打开
      <code>http://localhost:8080</code>。
    </p>
  </main>
  <script src="app.js"></script>
</body>
</html>

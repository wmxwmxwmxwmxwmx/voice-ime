<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice-IME</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>Voice-IME</h1>
    </header>

    <div id="errorBanner" class="error-banner" hidden></div>

    <section class="status-bar">
      <span id="wsStatus" class="badge badge-offline">离线</span>
      <span id="recStatus" class="badge badge-idle">就绪</span>
    </section>

    <section class="controls">
      <button id="startBtn" type="button">开始</button>
      <button id="stopBtn" type="button" disabled>停止</button>
    </section>

    <section class="config">
      <label>
        语言
        <select id="language">
          <option value="auto">自动</option>
          <option value="zh" selected>中文</option>
          <option value="en">英语</option>
        </select>
      </label>
    </section>

    <details class="advanced">
      <summary>高级</summary>
      <div class="advanced-body">
        <label>
          地址
          <input id="serverUrl" type="text" value="ws://localhost:9000" placeholder="ws://localhost:9000" />
        </label>
        <label class="checkbox-label" title="浏览器端 RNNoise 降噪">
          <input id="denoiseEnabled" type="checkbox" checked />
          降噪
        </label>
      </div>
    </details>

    <section class="transcript">
      <div id="result" class="result-box" aria-label="识别结果" aria-live="polite"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
